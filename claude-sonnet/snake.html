<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  :root {
    --bg: #10151a;
    --panel: #1a232b;
    --grid-a: #1e2a33;
    --grid-b: #19232b;
    --snake-head: #7ee787;
    --snake-body: #3fb950;
    --food: #f778ba;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: radial-gradient(circle at 50% 20%, #182028, var(--bg));
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    padding: 20px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 12px rgba(88, 166, 255, 0.4);
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: min(500px, 92vw);
    font-size: 18px;
    font-weight: 600;
  }

  #score {
    color: var(--snake-head);
  }

  .board-wrap {
    position: relative;
    border-radius: 10px;
    padding: 8px;
    background: var(--panel);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px #2a3540;
  }

  canvas {
    display: block;
    border-radius: 4px;
    background: var(--grid-a);
  }

  .overlay {
    position: absolute;
    inset: 8px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(10, 14, 18, 0.85);
    border-radius: 4px;
    text-align: center;
    padding: 20px;
  }

  .overlay.visible {
    display: flex;
  }

  .overlay h2 {
    margin: 0;
    font-size: 26px;
    color: #ff7b72;
  }

  .overlay p {
    margin: 0;
    font-size: 16px;
    color: var(--text);
  }

  .overlay button {
    margin-top: 6px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #0b1117;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease;
  }

  .overlay button:hover {
    background: #79b8ff;
  }

  .overlay button:active {
    transform: scale(0.97);
  }

  .controls {
    max-width: min(500px, 92vw);
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  .key {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    background: #232d36;
    border: 1px solid #34424e;
    font-family: monospace;
    color: var(--text);
  }
</style>
</head>
<body>

  <h1>SNAKE</h1>

  <div class="hud" style="width:min(500px, 92vw);">
    <span>Score: <span id="score">0</span></span>
    <span id="best">Best: 0</span>
  </div>

  <div class="board-wrap">
    <canvas id="game" width="500" height="500"></canvas>
    <div class="overlay" id="overlay">
      <h2>Game Over</h2>
      <p>Final score: <span id="finalScore">0</span></p>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <p class="controls">
    Use <span class="key">&uarr;</span><span class="key">&darr;</span><span class="key">&larr;</span><span class="key">&rarr;</span>
    or <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move.
    Eat the food, avoid the walls and yourself.
  </p>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlayEl = document.getElementById("overlay");
  const finalScoreEl = document.getElementById("finalScore");
  const restartBtn = document.getElementById("restartBtn");

  const COLS = 25;
  const ROWS = 25;
  const CELL = canvas.width / COLS; // 20px
  const TICK_MS = 110;

  const DIRS = {
    UP: { x: 0, y: -1 },
    DOWN: { x: 0, y: 1 },
    LEFT: { x: -1, y: 0 },
    RIGHT: { x: 1, y: 0 }
  };

  const KEY_MAP = {
    ArrowUp: DIRS.UP, KeyW: DIRS.UP,
    ArrowDown: DIRS.DOWN, KeyS: DIRS.DOWN,
    ArrowLeft: DIRS.LEFT, KeyA: DIRS.LEFT,
    ArrowRight: DIRS.RIGHT, KeyD: DIRS.RIGHT
  };

  function isOpposite(a, b) {
    return a.x === -b.x && a.y === -b.y;
  }

  function sameDir(a, b) {
    return a.x === b.x && a.y === b.y;
  }

  let snake, direction, directionQueue, food, score, best, running, timerId;

  function loadBest() {
    const stored = Number(localStorage.getItem("snake_best"));
    return Number.isFinite(stored) ? stored : 0;
  }

  function saveBest(value) {
    localStorage.setItem("snake_best", String(value));
  }

  function resetState() {
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);

    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY }
    ];
    direction = { ...DIRS.RIGHT };
    directionQueue = [];
    score = 0;
    running = true;

    food = spawnFood();

    scoreEl.textContent = "0";
    overlayEl.classList.remove("visible");
  }

  function freeCells() {
    const occupied = new Set(snake.map(s => s.x + "," + s.y));
    const cells = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        const key = x + "," + y;
        if (!occupied.has(key)) cells.push({ x, y });
      }
    }
    return cells;
  }

  function spawnFood() {
    const cells = freeCells();
    if (cells.length === 0) return null; // board full: effectively a win state
    return cells[Math.floor(Math.random() * cells.length)];
  }

  function queueDirection(newDir) {
    const lastIntended = directionQueue.length
      ? directionQueue[directionQueue.length - 1]
      : direction;

    if (isOpposite(newDir, lastIntended) || sameDir(newDir, lastIntended)) {
      return;
    }
    if (directionQueue.length < 2) {
      directionQueue.push(newDir);
    }
  }

  function tick() {
    if (!running) return;

    if (directionQueue.length > 0) {
      direction = directionQueue.shift();
    }

    const head = snake[0];
    const newHead = { x: head.x + direction.x, y: head.y + direction.y };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      return endGame();
    }

    const willGrow = food && newHead.x === food.x && newHead.y === food.y;

    // Self collision: consider the body cells that will still be occupied
    // after this move completes. The tail cell vacates unless we're growing,
    // in which case it stays and must be checked too.
    const bodyToCheck = willGrow ? snake : snake.slice(0, snake.length - 1);
    for (let i = 0; i < bodyToCheck.length; i++) {
      if (bodyToCheck[i].x === newHead.x && bodyToCheck[i].y === newHead.y) {
        return endGame();
      }
    }

    snake.unshift(newHead);
    if (willGrow) {
      score++;
      scoreEl.textContent = String(score);
      food = spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    running = false;
    clearInterval(timerId);

    if (score > best) {
      best = score;
      saveBest(best);
      bestEl.textContent = "Best: " + best;
    }

    finalScoreEl.textContent = String(score);
    overlayEl.classList.add("visible");
    draw();
  }

  function draw() {
    // Checkerboard background
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        ctx.fillStyle = (x + y) % 2 === 0 ? "#1e2a33" : "#19232b";
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }

    // Food
    if (food) {
      ctx.fillStyle = "#f778ba";
      const pad = CELL * 0.15;
      ctx.beginPath();
      ctx.roundRect(food.x * CELL + pad, food.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
      ctx.fill();
    }

    // Snake
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      ctx.fillStyle = i === 0 ? "#7ee787" : "#3fb950";
      const pad = i === 0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 3);
      ctx.fill();
    }
  }

  function startLoop() {
    clearInterval(timerId);
    timerId = setInterval(tick, TICK_MS);
  }

  function startGame() {
    resetState();
    startLoop();
    draw();
  }

  document.addEventListener("keydown", (e) => {
    const dir = KEY_MAP[e.code];
    if (!dir) return;
    e.preventDefault();

    if (!running) return;
    queueDirection(dir);
  });

  restartBtn.addEventListener("click", startGame);

  best = loadBest();
  bestEl.textContent = "Best: " + best;

  startGame();
})();
</script>
</body>
</html>
